<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary — MedReg Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg-primary:#0A0F1E; --bg-secondary:#0f1628; --bg-card:#141B2D; --bg-card-hover:#1a2340; --blue:#1E6FFF; --teal:#00D4C8; --amber:#F5A623; --white:#F0F4FF; --muted:#8A9BB8; --border:rgba(30,111,255,0.15); }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg-primary); color:var(--white); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; }
.pulse-line { position:fixed; top:0; left:0; width:100%; height:2px; z-index:1000; overflow:hidden; }
.pulse-line::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,var(--teal),var(--blue),transparent); animation:pulse-sweep 3s ease-in-out infinite; }
@keyframes pulse-sweep { 0%{left:-100%} 100%{left:100%} }
nav { position:fixed; top:2px; left:0; width:100%; z-index:999; padding:0 40px; height:64px; display:flex; align-items:center; justify-content:space-between; background:rgba(10,15,30,0.9); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
.nav-logo { font-family:'Chakra Petch',sans-serif; font-size:1.2rem; font-weight:700; color:var(--white); text-decoration:none; }
.nav-logo span { color:var(--teal); }
.nav-links { display:flex; gap:28px; list-style:none; }
.nav-links a { color:var(--muted); text-decoration:none; font-size:0.82rem; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; transition:color 0.2s; }
.nav-links a:hover, .nav-links a.active { color:var(--white); }
.nav-cta { background:transparent; border:1px solid var(--teal); color:var(--teal); padding:8px 20px; font-family:'IBM Plex Sans',sans-serif; font-size:0.82rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; border-radius:2px; transition:all 0.2s; text-decoration:none; }
.nav-cta:hover { background:var(--teal); color:var(--bg-primary); }
.page-header { padding:100px 40px 48px; max-width:1200px; margin:0 auto; }
.page-label { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--teal); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:12px; }
.page-title { font-family:'Chakra Petch',sans-serif; font-size:clamp(1.8rem,3.5vw,2.8rem); font-weight:700; margin-bottom:12px; }
.page-desc { color:var(--muted); font-size:1rem; line-height:1.7; max-width:600px; }
.main-content { max-width:1200px; margin:0 auto; padding:0 40px 80px; }

/* SEARCH */
.search-bar { display:flex; gap:12px; margin-bottom:28px; align-items:center; }
.search-input { flex:1; background:var(--bg-card); border:1px solid var(--border); color:var(--white); padding:14px 20px; font-family:'IBM Plex Sans',sans-serif; font-size:0.95rem; border-radius:2px; outline:none; transition:border-color 0.2s; }
.search-input:focus { border-color:var(--teal); }
.search-input::placeholder { color:var(--muted); }
.search-count { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--muted); white-space:nowrap; }

/* FILTER TAGS */
.filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:32px; }
.filter-tag { padding:6px 14px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border-radius:1px; transition:all 0.2s; }
.filter-tag:hover, .filter-tag.active { color:var(--white); border-color:var(--blue); background:rgba(30,111,255,0.1); }
.filter-tag.samd.active { border-color:var(--blue); color:var(--blue); background:rgba(30,111,255,0.08); }
.filter-tag.cyber.active { border-color:var(--amber); color:var(--amber); background:rgba(245,166,35,0.08); }
.filter-tag.aiml.active { border-color:var(--teal); color:var(--teal); background:rgba(0,212,200,0.08); }
.filter-tag.general.active { border-color:var(--muted); color:var(--white); }

/* ALPHABET NAV */
.alpha-nav { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:32px; }
.alpha-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.72rem; cursor:pointer; border-radius:1px; transition:all 0.2s; }
.alpha-btn:hover { color:var(--white); border-color:var(--blue); }
.alpha-btn.has-terms { color:var(--white); }
.alpha-btn.active { background:var(--blue); color:var(--white); border-color:var(--blue); }

/* GLOSSARY LIST */
.alpha-section { margin-bottom:48px; }
.alpha-header { font-family:'Chakra Petch',sans-serif; font-size:2rem; font-weight:700; color:rgba(30,111,255,0.3); border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:20px; }
.term-card { background:var(--bg-card); border:1px solid var(--border); border-radius:2px; padding:24px 28px; margin-bottom:2px; transition:background 0.2s; cursor:pointer; position:relative; }
.term-card:hover { background:var(--bg-card-hover); }
.term-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:0; }
.term-name { font-family:'Chakra Petch',sans-serif; font-size:1rem; font-weight:700; line-height:1.2; }
.term-tags { display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; }
.term-tag { font-family:'JetBrains Mono',monospace; font-size:0.6rem; padding:2px 7px; border-radius:1px; text-transform:uppercase; letter-spacing:0.05em; }
.t-samd { background:rgba(30,111,255,0.12); color:var(--blue); border:1px solid rgba(30,111,255,0.25); }
.t-cyber { background:rgba(245,166,35,0.12); color:var(--amber); border:1px solid rgba(245,166,35,0.25); }
.t-aiml { background:rgba(0,212,200,0.12); color:var(--teal); border:1px solid rgba(0,212,200,0.25); }
.t-general { background:rgba(138,155,184,0.12); color:var(--muted); border:1px solid rgba(138,155,184,0.2); }
.t-fda { background:rgba(30,111,255,0.08); color:#6fa3ff; border:1px solid rgba(30,111,255,0.2); }
.t-eu { background:rgba(255,215,0,0.08); color:#FFD700; border:1px solid rgba(255,215,0,0.2); }

.term-body { margin-top:12px; font-size:0.88rem; line-height:1.7; color:var(--white); display:none; }
.term-body.open { display:block; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
.term-source { margin-top:10px; font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--muted); }
.term-chevron { color:var(--muted); font-size:0.8rem; transition:transform 0.2s; flex-shrink:0; margin-top:2px; }
.term-card.open .term-chevron { transform:rotate(180deg); }
.term-abbr { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--teal); margin-bottom:4px; }

.no-results { text-align:center; padding:60px 20px; color:var(--muted); font-size:1rem; }
.hidden { display:none; }

@media(max-width:768px) {
  nav { padding:0 20px; }
  .nav-links { display:none; }
  .page-header, .main-content { padding-left:20px; padding-right:20px; }
  .term-header { flex-direction:column; }
}
</style>

<div class="page-header">
  <div class="page-label">// regulatory glossary</div>
  <h1 class="page-title">Glossary of Regulatory Terms</h1>
  <p class="page-desc">Searchable definitions for key SaMD, cybersecurity, and AI/ML regulatory terms. Click any term to expand its definition.</p>
</div>

<div class="main-content">
  <div class="search-bar">
    <input type="text" class="search-input" id="search-input" placeholder="Search terms, acronyms, definitions..." oninput="filterTerms()">
    <span class="search-count" id="search-count"></span>
  </div>

  <div class="filter-row">
    <button class="filter-tag active" onclick="filterByDomain('all',this)">All Domains</button>
    <button class="filter-tag samd" onclick="filterByDomain('samd',this)">SaMD / SiMD</button>

    <button class="filter-tag aiml" onclick="filterByDomain('aiml',this)">AI/ML</button>
    <button class="filter-tag general" onclick="filterByDomain('general',this)">General RA</button>
  </div>

</div>

<script>
const TERMS = [
  // A
  { term:'Adaptive Algorithm', abbr:'', domains:['aiml'], jur:['fda'], def:'An AI/ML algorithm that continues to learn and update its parameters after deployment based on new real-world data. Adaptive algorithms face heightened regulatory scrutiny because post-deployment changes may affect safety and effectiveness in ways not evaluated pre-market. FDA distinguishes adaptive algorithms from "locked" algorithms.', src:'FDA AI/ML Action Plan 2021' },
  { term:'Algorithm Change Control', abbr:'ACC', domains:['aiml'], jur:['fda','eu'], def:'A formal process for managing modifications to AI/ML algorithms after regulatory clearance or approval. Includes assessment of whether changes constitute a significant change requiring a new submission. FDA\'s PCCP provides a framework for pre-approved algorithm changes.', src:'FDA AI/ML Action Plan / EU AI Act Art. 9' },
  { term:'Analytical Validation', abbr:'', domains:['samd','aiml'], jur:['fda','eu','imdrf'], def:'The second building block of IMDRF N41 SaMD clinical evaluation. Demonstrates that the SaMD correctly processes input data to generate accurate, reliable, precise output data. For AI/ML, includes testing on an independent locked test set with appropriate performance metrics.', src:'IMDRF N41:2017' },
  { term:'ARTG', abbr:'Australian Register of Therapeutic Goods', domains:['general'], jur:['tga'], def:'The Australian Register of Therapeutic Goods (ARTG) is the database maintained by TGA that lists all therapeutic goods, including medical devices and software, approved for supply in Australia. Inclusion in the ARTG is required before a medical device can be legally supplied.', src:'TGA / TRA' },
  // B
  { term:'Benefit-Risk Analysis', abbr:'', domains:['samd','general'], jur:['fda','eu'], def:'A structured assessment weighing the anticipated benefits of a medical device against its potential risks to determine whether the device is acceptable for its intended use. Required in FDA premarket submissions and EU MDR Technical Documentation. Must be updated throughout the device lifecycle.', src:'EU MDR Annex I / FDA Benefit-Risk Guidance' },
  { term:'Bias (AI/ML)', abbr:'', domains:['aiml'], jur:['fda','eu','imdrf'], def:'Systematic error in AI/ML model outputs arising from flawed assumptions in training data or the modeling process. May result in disparate performance across demographic subgroups. Regulators require bias analysis and mitigation in AI/ML SaMD submissions. EU AI Act Article 10 explicitly requires data examined for biases.', src:'EU AI Act Art. 10 / GMLP Principles / MDCG 2025-6' },
  // C
  { term:'CE Marking', abbr:'', domains:['general','samd'], jur:['eu'], def:'The conformity marking required for medical devices placed on the EU market under EU MDR. CE marking indicates the manufacturer declares conformity with applicable EU regulations. Depending on risk class, achieved through self-certification (Class I) or Notified Body conformity assessment (Class IIa–III).', src:'EU MDR 2017/745 Art. 18-24' },
  { term:'CER', abbr:'Clinical Evaluation Report', domains:['samd','general'], jur:['eu'], def:'A formal document required by EU MDR that documents the systematic and planned process to continuously generate, collect, analyze and assess clinical data pertaining to a device. Must include literature review, clinical investigation data, SOTA analysis, and benefit-risk assessment. Must be kept current throughout device lifetime.', src:'EU MDR Annex XIV Part A / MDCG 2020-1' },
  { term:'Clinical Decision Support (CDS)', abbr:'CDS', domains:['samd'], jur:['fda'], def:'Software that provides healthcare professionals or patients with information to support clinical decision-making. Under FDA\'s 2022 CDS guidance, CDS meeting all four criteria (non-patient-specific basis displayed, allows independent review, not for critical/serious decisions) is exempt from device regulation under the 21st Century Cures Act.', src:'FDA CDS Guidance 2022 / 21st Century Cures Act' },
  { term:'Clinical Validation', abbr:'', domains:['samd','aiml'], jur:['fda','eu','imdrf'], def:'The third building block of IMDRF N41 SaMD clinical evaluation. Demonstrates that the SaMD achieves its intended purpose by generating output that leads to accurate diagnoses, informed treatment decisions, or improved outcomes in the target population. Requires real-world data from the intended use context.', src:'IMDRF N41:2017' },
  { term:'Conformity Assessment', abbr:'', domains:['general','samd'], jur:['eu'], def:'The process by which a manufacturer demonstrates that a medical device meets the requirements of EU MDR or IVDR. The procedure depends on device risk class, ranging from self-assessment (Class I) to full Notified Body examination (Class III). Culminates in CE marking.', src:'EU MDR Annex IX, X, XI' },
  { term:'CVE', abbr:'Common Vulnerabilities and Exposures', domains:['cyber'], jur:['fda','eu'], def:'A public list of disclosed cybersecurity vulnerabilities, each assigned a unique identifier (CVE ID) and severity score (CVSS). Manufacturers must monitor CVEs affecting software components listed in their SBOM and respond per their cybersecurity management plan. Critical input for medical device vulnerability management.', src:'NIST NVD / FDA Postmarket Cyber Guidance' },
  { term:'Cybersecurity Management Plan', abbr:'', domains:['cyber'], jur:['fda'], def:'A plan required in FDA premarket cybersecurity submissions demonstrating how the manufacturer will monitor for cybersecurity vulnerabilities, assess their impact, coordinate disclosure, and deploy patches throughout the device lifecycle. Must include timelines for critical (30-day) and non-critical (60-day) patches.', src:'FDA Cybersecurity Guidance 2023' },
  // D
  { term:'Data Governance', abbr:'', domains:['aiml'], jur:['eu'], def:'Organizational policies and practices for managing data quality, representativeness, integrity, and compliance throughout the data lifecycle. EU AI Act Article 10 requires high-risk AI systems to have appropriate data governance and management practices, including procedures for data collection, analysis, labeling, and bias examination.', src:'EU AI Act Art. 10 / MDCG 2025-6' },
  { term:'De Novo Request', abbr:'', domains:['samd'], jur:['fda'], def:'FDA regulatory pathway for novel, low-to-moderate risk medical devices with no legally marketed predicate. De Novo creates a new classification with associated special controls that future devices can use as a predicate for 510(k) submissions. Requires demonstration of reasonable assurance of safety and effectiveness.', src:'21 CFR Part 860.260 / FDA De Novo Guidance' },
  { term:'Design Control', abbr:'', domains:['general','samd'], jur:['fda'], def:'A set of formal processes required by FDA\'s Quality System Regulation (21 CFR 820.30) ensuring medical device design and development activities are planned, controlled, and documented. Includes design input, output, review, verification, validation, transfer, and change control. Essential for SaMD development.', src:'21 CFR Part 820.30 / ISO 13485' },
  // E
  { term:'EUDAMED', abbr:'European Database for Medical Devices', domains:['general','samd'], jur:['eu'], def:'The European database on medical devices, established under EU MDR. Manufacturers must register in EUDAMED and assign UDI codes to devices before placing them on the EU market. EUDAMED serves as the central transparency database for regulators, notified bodies, and the public.', src:'EU MDR Art. 33 / EUDAMED Regulation' },
  // F
  { term:'510(k)', abbr:'', domains:['samd'], jur:['fda'], def:'FDA premarket notification pathway requiring manufacturers to demonstrate that a new device is "substantially equivalent" to a legally marketed predicate device in intended use and technological characteristics. The most common pathway for Class II SaMD. Does not require clinical trials unless performance data is needed for equivalence.', src:'21 CFR Part 807 / FDA 510(k) Program Guidance' },
  // G
  { term:'GMLP', abbr:'Good Machine Learning Practice', domains:['aiml'], jur:['fda','hc','mhra'], def:'A set of 10 guiding principles for AI/ML-based medical device development, jointly issued by FDA, Health Canada, and the UK MHRA in 2021. Covers: multi-disciplinary expertise, relevant data, dataset management, training/test separation, performance metrics, human-AI teaming, transparency, real-world performance monitoring, and continuous improvement.', src:'FDA/HC/MHRA GMLP Joint Statement 2021' },
  { term:'GSPR', abbr:'General Safety and Performance Requirements', domains:['samd','general'], jur:['eu'], def:'The fundamental safety and performance requirements that all CE-marked medical devices must meet under EU MDR Annex I. GSPR 17.2 specifically addresses electronic programmable systems and software, requiring security measures and protection against unauthorized access.', src:'EU MDR 2017/745 Annex I' },
  // H
  { term:'Human Oversight', abbr:'', domains:['aiml'], jur:['eu','fda'], def:'The ability of users to understand, monitor, and intervene in the operation of an AI system. EU AI Act Article 14 requires high-risk AI systems to be designed to allow human oversight during their operation. For medical AI, this means clinicians can understand and appropriately act on AI outputs without being compelled to follow them.', src:'EU AI Act Art. 14 / MDCG 2025-6' },
  // I
  { term:'IDE', abbr:'Investigational Device Exemption', domains:['samd','general'], jur:['fda'], def:'FDA exemption allowing investigational medical devices to be used in clinical studies without prior clearance, provided the study follows IDE regulations. Required for significant risk device studies. Non-significant risk devices may proceed under abbreviated IDE requirements with IRB approval only.', src:'21 CFR Part 812 / FDA IDE Guidance' },
  { term:'IFU', abbr:'Instructions for Use', domains:['samd','general'], jur:['fda','eu'], def:'The labeling document accompanying a medical device that describes its intended purpose, how to use it safely, indications, contraindications, warnings, and precautions. For SaMD, IFU must specify intended user, clinical setting, minimum IT/hardware requirements, and — for AI — scope, limitations, and human oversight guidance.', src:'EU MDR Annex I §23 / FDA Labeling Requirements' },
  { term:'Intended Use', abbr:'', domains:['samd','general'], jur:['fda','eu'], def:'The objective intent of a manufacturer for how a device is to be used, as reflected in labeling, advertising, and promotional materials. Distinct from "indications for use" (which specifies patient population, disease/condition). FDA uses intended use to determine device classification and applicable regulatory requirements.', src:'FDA 21 CFR 801.4 / CDRH Terminology' },
  { term:'IVDR', abbr:'In Vitro Diagnostic Regulation', domains:['samd','general'], jur:['eu'], def:'EU Regulation 2017/746 governing in vitro diagnostic medical devices in the EU, including IVD software. Replaced the IVD Directive. Establishes four risk classes (A–D) for IVDs. Software generating results for use in IVD procedures may qualify as IVD medical device software subject to IVDR.', src:'EU IVDR 2017/746' },
  // L
  { term:'Locked Algorithm', abbr:'', domains:['aiml'], jur:['fda'], def:'An AI/ML algorithm whose parameters and logic do not change after deployment. A locked algorithm undergoes a single validation at a defined version; any subsequent algorithm changes require a new regulatory submission (or PCCP review). Contrasted with "adaptive" or "continuously learning" algorithms.', src:'FDA AI/ML Action Plan 2021' },
  // M
  { term:'MDAI', abbr:'Medical Device Artificial Intelligence', domains:['aiml'], jur:['eu'], def:'Term used in MDCG 2025-6 to describe AI systems that qualify as medical device software under EU MDR/IVDR. MDAI systems that are high-risk under EU AI Act Annex III must comply with both EU MDR/IVDR and EU AI Act requirements simultaneously.', src:'MDCG 2025-6' },
  { term:'MDCG', abbr:'Medical Device Coordination Group', domains:['general'], jur:['eu'], def:'An advisory body established under EU MDR, composed of representatives from EU member states. MDCG issues guidance documents (MDCG guidance) on implementation of EU MDR and IVDR, including MDSW qualification, cybersecurity, clinical evaluation, AI/ML, and UDI. MDCG guidance is highly influential but not legally binding.', src:'EU MDR Art. 105' },
  { term:'MDSW', abbr:'Medical Device Software', domains:['samd'], jur:['eu'], def:'The EU MDR/IVDR term for software that qualifies as a medical device or IVD medical device. Qualification follows MDCG 2021-24 two-step process: (1) assess if software has a medical purpose; (2) determine if it creates/modifies information rather than merely storing/displaying data. MDSW is then classified under MDR Rule 11 or IVDR rules.', src:'MDCG 2021-24' },
  // N
  { term:'NB (Notified Body)', abbr:'NB', domains:['general','samd'], jur:['eu'], def:'An organization designated by an EU member state to assess the conformity of certain medical devices before they are placed on the EU market. Required for Class IIa, IIb, and III medical devices and Class B, C, D IVDs. Notified Bodies audit QMS, review technical documentation, and issue certificates enabling CE marking.', src:'EU MDR Art. 36-52' },
  { term:'NIS2', abbr:'Network and Information Security Directive 2', domains:['cyber'], jur:['eu'], def:'EU Directive 2022/2555 requiring essential and important entities — including healthcare organizations — to implement cybersecurity risk management measures and report significant incidents. Intersects with EU MDR cybersecurity obligations for medical device manufacturers operating in the EU.', src:'EU NIS2 Directive 2022/2555' },
  // P
  { term:'PCCP', abbr:'Predetermined Change Control Plan', domains:['aiml'], jur:['fda'], def:'A pre-specified plan included in an FDA premarket submission that describes: (1) anticipated modifications to the AI/ML device, (2) the methodology for making those modifications, and (3) the performance criteria confirming the changes are safe. Allows FDA-approved algorithm changes without requiring a new 510(k) or PMA supplement.', src:'FDA PCCP Draft Guidance 2023 / AI/ML Action Plan' },
  { term:'Performance Drift', abbr:'', domains:['aiml'], jur:['fda','eu'], def:'A decline in AI/ML model performance over time due to changes in the clinical environment, patient population, clinical practice, or data acquisition methods — even without any change to the algorithm itself. Requires ongoing post-market performance monitoring for all AI/ML SaMD, including locked algorithms.', src:'GMLP Principles / FDA AI/ML SaMD / MDCG 2025-6' },
  { term:'PMA', abbr:'Premarket Approval', domains:['samd'], jur:['fda'], def:'The most stringent FDA premarket review process, required for Class III devices that support or sustain human life, are of substantial importance in preventing impairment, or present potential unreasonable risk of illness or injury. Requires valid scientific evidence demonstrating reasonable assurance of safety and effectiveness.', src:'21 CFR Part 814 / FDA PMA Guidance' },
  { term:'PMCF', abbr:'Post-Market Clinical Follow-Up', domains:['samd','general'], jur:['eu'], def:'A continuing activity required under EU MDR Annex XIV to proactively collect and evaluate clinical data from post-market use of a CE-marked device. PMCF Plan and PMCF Evaluation Report are mandatory for Class II and III devices. Methods include registries, post-market clinical investigations, user surveys, and systematic literature reviews.', src:'EU MDR Annex XIV Part B / MDCG 2020-7' },
  { term:'PMSR', abbr:'Post-Market Surveillance Report', domains:['general','samd'], jur:['eu'], def:'A report required for Class I and IIa devices under EU MDR summarizing conclusions of the PMS system and assessment of whether the device\'s benefit-risk profile remains acceptable. Class IIb and III devices require a Periodic Safety Update Report (PSUR) instead.', src:'EU MDR Art. 85' },
  { term:'PSUR', abbr:'Periodic Safety Update Report', domains:['general','samd'], jur:['eu'], def:'A report required for Class IIb and III devices under EU MDR at least every two years (IIb) or annually (III). Summarizes results of PMS activities, trends, benefit-risk analysis, and conclusions on continued performance and safety. Must be made available to Notified Bodies and competent authorities on request.', src:'EU MDR Art. 86' },
  // Q
  { term:'QMS', abbr:'Quality Management System', domains:['general'], jur:['fda','eu','imdrf'], def:'A formalized system documenting processes, procedures, and responsibilities for achieving quality policies and objectives. ISO 13485 is the international standard for medical device QMS. FDA requires compliance with its Quality System Regulation (21 CFR Part 820) — being harmonized with ISO 13485 via the QMSR effective 2026.', src:'ISO 13485:2016 / 21 CFR Part 820 / QMSR' },
  // R
  { term:'Real-World Evidence (RWE)', abbr:'RWE', domains:['samd','aiml','general'], jur:['fda','eu'], def:'Clinical evidence derived from analysis of real-world data (RWD) — data from electronic health records, registries, claims data, patient-generated data — rather than randomized controlled trials. FDA has an RWE program for medical devices under the 21st Century Cures Act. EU MDR PMCF leverages RWE for ongoing clinical evidence.', src:'FDA RWE Framework / EU MDR Annex XIV' },
  { term:'Risk Management', abbr:'', domains:['samd','general'], jur:['fda','eu','imdrf'], def:'A systematic application of policies, procedures, and practices to analyze, evaluate, control, and monitor risks throughout the medical device lifecycle. ISO 14971 is the primary international standard. Risk management must be documented, maintained, and updated throughout the device lifecycle including post-market.', src:'ISO 14971:2019 / EU MDR Annex I §3' },
  // S
  { term:'SaMD', abbr:'Software as a Medical Device', domains:['samd'], jur:['fda','eu','imdrf'], def:'Software intended to be used for one or more medical purposes that perform these purposes without being part of a hardware medical device (IMDRF N10). SaMD includes mobile apps, cloud-based algorithms, decision support software, and diagnostic software — when they have a medical intended purpose.', src:'IMDRF N10:2013' },
  { term:'SBOM', abbr:'Software Bill of Materials', domains:['cyber'], jur:['fda','eu'], def:'A machine-readable, formal inventory of all software components, open-source libraries, and third-party dependencies in a medical device or software system, along with version information. Required by FDA 2023 premarket cybersecurity guidance. Enables manufacturers to rapidly assess impact of newly discovered vulnerabilities (CVEs).', src:'FDA Cybersecurity Guidance 2023 / NTIA SBOM Guidance' },
  { term:'SiMD', abbr:'Software in a Medical Device', domains:['samd'], jur:['fda','eu'], def:'Software embedded in or incorporated as an integral part of a hardware medical device — software that controls or drives the hardware device\'s functionality. SiMD is subject to device-specific regulations applicable to its host hardware device. Contrasted with SaMD, which functions independently of hardware.', src:'IEC 62304 / FDA Software Guidance' },
  { term:'SOTA', abbr:'State of the Art', domains:['general','samd'], jur:['eu'], def:'The developed stage of technical capability at a given time regarding products, processes, and services, based on relevant consolidated findings of science, technology, and experience. EU MDR requires cybersecurity and technical solutions to reflect the SOTA. MDCG 2020-6 provides guidance on applying SOTA in clinical evaluation.', src:'EU MDR Annex I §1 / MDCG 2020-6' },
  // T
  { term:'Technical Documentation', abbr:'TD', domains:['general','samd'], jur:['eu'], def:'The comprehensive body of evidence required for CE marking under EU MDR, described in Annexes II and III. Must include: device description, design and manufacturing information, risk management, general safety and performance requirements (GSPR) compliance, clinical evaluation, and PMS plan.', src:'EU MDR Annex II & III' },
  { term:'Threat Model', abbr:'', domains:['cyber'], jur:['fda'], def:'A structured analysis identifying what must be protected (assets), who might attack (threat actors), how they might attack (attack vectors and surfaces), and what mitigations reduce risk. FDA requires a threat model as part of premarket cybersecurity submissions. Common frameworks include STRIDE and PASTA.', src:'FDA Cybersecurity Guidance 2023 / STRIDE Methodology' },
  // U
  { term:'UDI', abbr:'Unique Device Identifier', domains:['general','samd'], jur:['fda','eu'], def:'A unique numeric or alphanumeric code assigned to a medical device that allows its identification and traceability through the supply chain and throughout its lifecycle. Required by FDA (21 CFR Part 830) and EU MDR. For SaMD, the UDI is associated with each version or release of the software.', src:'21 CFR Part 830 / EU MDR Art. 27' },
  // V
  { term:'Valid Clinical Association', abbr:'VCA', domains:['samd','aiml'], jur:['fda','eu','imdrf'], def:'The first building block of IMDRF N41 SaMD clinical evaluation. Establishes that the relationship between the SaMD output (what the software measures, predicts, or classifies) and the targeted clinical condition is clinically meaningful and scientifically valid. Based on scientific evidence — prior literature, physiological rationale, or clinical studies.', src:'IMDRF N41:2017' },
];

let currentFilter = 'all';
let currentSearch = '';

function filterByDomain(domain, btn) {
  currentFilter = domain;
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active','samd','cyber','aiml','general'));
  btn.classList.add('active');
  if (domain !== 'all') btn.classList.add(domain);
  render();
}

function filterTerms() {
  currentSearch = document.getElementById('search-input').value.toLowerCase();
  render();
}

function getFilteredTerms() {
  return TERMS.filter(t => {
    const domainMatch = currentFilter === 'all' || t.domains.includes(currentFilter);
    const searchMatch = !currentSearch ||
      t.term.toLowerCase().includes(currentSearch) ||
      t.abbr.toLowerCase().includes(currentSearch) ||
      t.def.toLowerCase().includes(currentSearch);
    return domainMatch && searchMatch;
  });
}

function render() {
  const filtered = getFilteredTerms();
  document.getElementById('search-count').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  // Group by letter
  const grouped = {};
  filtered.forEach(t => {
    const letter = t.term[0].toUpperCase();
    if (!grouped[letter]) grouped[letter] = [];
    grouped[letter].push(t);
  });

  const letters = Object.keys(grouped).sort();

  // Alpha nav
  const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  let alphaHtml = '';
  allLetters.forEach(l => {
    const has = !!grouped[l];
    alphaHtml += `<button class="alpha-btn ${has ? 'has-terms' : ''}" onclick="${has ? `document.getElementById('section-${l}').scrollIntoView({behavior:'smooth'})` : ''}">${l}</button>`;
  });
  document.getElementById('alpha-nav').innerHTML = alphaHtml;

  // Content
  let html = '';
  if (!filtered.length) {
    html = '<div class="no-results">No terms found matching your search. Try different keywords.</div>';
  } else {
    letters.forEach(letter => {
      html += `<div class="alpha-section" id="section-${letter}"><div class="alpha-header">${letter}</div>`;
      grouped[letter].forEach((t, i) => {
        const tagHtml = [...t.domains.map(d => `<span class="term-tag t-${d}">${d === 'aiml' ? 'AI/ML' : d === 'samd' ? 'SaMD' : d === 'cyber' ? 'Cyber' : 'RA'}</span>`), ...t.jur.map(j => `<span class="term-tag t-${j}">${j.toUpperCase()}</span>`)].join('');
        html += `
          <div class="term-card" onclick="toggleTerm(this)">
            <div class="term-header">
              <div>
                ${t.abbr ? `<div class="term-abbr">${t.abbr}</div>` : ''}
                <div class="term-name">${t.term}</div>
              </div>
              <div style="display:flex;gap:10px;align-items:flex-start">
                <div class="term-tags">${tagHtml}</div>
                <span class="term-chevron">▼</span>
              </div>
            </div>
            <div class="term-body">
              ${t.def}
              <div class="term-source">Source: ${t.src}</div>
            </div>
          </div>`;
      });
      html += '</div>';
    });
  }
  document.getElementById('glossary-content').innerHTML = html;
}

function toggleTerm(card) {
  const body = card.querySelector('.term-body');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  card.classList.toggle('open', !isOpen);
}

render();
</script>
</body>
</html>
